<!DOCTYPE html>
<body style="margin:0; background:linear-gradient(to right,#6a5af9
,#8e6ddf); 
display:flex; justify-content:center; align-items:center; height:100vh; font-family:sans-serif;">

<div style="width:80%; height:80%;  display:flex; border-radius:10px; overflow:hidden;">

    
    <div style="
        width:60%;
        padding:60px;
        color:white;
        background:linear-gradient(135deg,#6a5af9,#ff8c8c);
        text-align:left;
    ">
        <h1 style="font-size:50px;font-weight: bold;">Welcome to website</h1>
        <p style="font: size 15px; line-height:1.6;">
        A website is a collection of interconnected web pages,files, and 
        media under a single domain name, hosted on a server, and  via the internet through a web browser. 

        </p>
    </div>
    <div style="
        width:40%;
        padding:60px 40px;
        text-align:center;
        background-color:white;
    ">


        <h2 style="color:#6a5af9; margin-bottom:40px;">USER LOGIN</h2>

        
        <div style="margin-bottom:20px;">
            <input type="text" placeholder="Username"
            style="width:100%; padding:12px; border-radius:25px; border:none; background:#f0f0f0;">
        </div>

        
        <div style="margin-bottom:20px;">
            <input type="password" placeholder="Password"
            style="width:100%; padding:12px; border-radius:25px; border:none; background:#f0f0f0;">
        </div>

        
        <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:30px;">
            <label>
                <input type="checkbox"> Remember me
            </label>
            <a href="#" style="text-decoration:none; color:gray;">Forgot password?</a>
        </div>

        
        <button style="
            width:60%;
            padding:12px;
            border:none;
            border-radius:25px;
            background:linear-gradient(to right,#6a5af9,#ff8c8c);
            color:white;
            font-size:16px;
            cursor:pointer;
        ">
            LOGIN
        </button>
    </div>

</div>

</body>
</html>
